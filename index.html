<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<title>EMVY CHECK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Space Mono',monospace;color:#eef0f5}
canvas#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0}
 
.logo{position:fixed;top:max(env(safe-area-inset-top,0px),16px);left:16px;z-index:10;
  width:46px;height:46px;border-radius:10px;border:1px solid rgba(255,179,71,.45);
  box-shadow:0 0 16px rgba(255,179,71,.22);overflow:hidden;cursor:pointer;}
.logo img{width:100%;height:100%;object-fit:cover;display:block;background:url("https://media.emvycheck.com/IMAGES/LOGOS/EMVY_CHECK_LOGO_ORIGINAL.jpg") center/cover}
 
.top-right{position:fixed;top:max(env(safe-area-inset-top,0px),16px);right:16px;z-index:10;display:flex;gap:7px}
.top-btn{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;border-radius:6px;
  text-decoration:none;font-family:'Space Mono',monospace;cursor:pointer;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);
  transition:all .2s;}
.top-btn:hover,.top-btn:active{background:rgba(255,179,71,.15);border-color:rgba(255,179,71,.4);color:#ffb347}
.top-btn.amber{background:rgba(255,179,71,.1);border-color:rgba(255,179,71,.4);color:#ffb347}
.top-btn.amber:hover{background:rgba(255,179,71,.25)}
 
/* TRACK INFO BLOCK */
.track-block{position:fixed;bottom:118px;left:16px;right:80px;z-index:10;display:flex;align-items:flex-end;gap:10px}
.track-info{flex:1;min-width:0}
.track-album{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(19px,5vw,38px);
  letter-spacing:.04em;line-height:1;color:#fff;text-shadow:0 0 26px rgba(255,179,71,.32);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-name.idle{color:rgba(255,255,255,.2);font-size:clamp(13px,3.5vw,22px)}
 
/* ADD TO PLAYLIST BUTTON — inline with track info */
.add-now-btn{width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.45);font-size:18px;display:grid;place-items:center;
  transition:all .22s;margin-bottom:2px;}
.add-now-btn:hover,.add-now-btn:active{background:rgba(78,240,255,.18);border-color:rgba(78,240,255,.45);color:#4ef0ff}
.add-now-btn.in-pl{background:rgba(78,240,255,.14);border-color:rgba(78,240,255,.4);color:#4ef0ff}
 
/* SHARE TRACK BUTTON */
.share-now-btn{width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.45);font-size:14px;display:grid;place-items:center;
  transition:all .22s;margin-bottom:2px;}
.share-now-btn:hover,.share-now-btn:active{background:rgba(255,179,71,.18);border-color:rgba(255,179,71,.45);color:#ffb347}
 
/* PROGRESS */
.progress-wrap{position:fixed;bottom:80px;left:0;right:0;z-index:10;padding:0 16px}
.progress-bar{width:100%;height:2px;background:rgba(255,255,255,.08);border-radius:1px;cursor:pointer}
.progress-fill{height:100%;border-radius:1px;width:0%;background:linear-gradient(90deg,#ffb347,#4ef0ff);transition:width .1s linear}
.times{display:flex;justify-content:space-between;margin-top:5px;font-size:9px;letter-spacing:.07em;color:rgba(255,255,255,.2)}
 
/* CONTROLS */
.controls{position:fixed;bottom:16px;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:center;gap:5px;padding:0 16px}
.ctrl{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);font-size:13px;
  cursor:pointer;display:grid;place-items:center;transition:all .18s;flex-shrink:0;}
.ctrl:hover,.ctrl:active{background:rgba(255,179,71,.15);border-color:rgba(255,179,71,.4);color:#ffb347}
.ctrl.play-btn{width:52px;height:52px;font-size:16px;background:rgba(255,179,71,.12);border-color:rgba(255,179,71,.45);color:#ffb347}
.ctrl.play-btn:hover{background:rgba(255,179,71,.26);box-shadow:0 0 20px rgba(255,179,71,.26)}
.ctrl.on{background:rgba(255,179,71,.15);border-color:rgba(255,179,71,.4);color:#ffb347}
.ctrl.active-pl{background:rgba(78,240,255,.12);border-color:rgba(78,240,255,.35);color:#4ef0ff}
.ctrl.shuffle-on{background:rgba(200,255,74,.12);border-color:rgba(200,255,74,.38);color:#c8ff4a}
.ctrl.surprise{background:rgba(255,220,50,.08);border-color:rgba(255,220,50,.28);color:rgba(255,220,50,.7)}
.ctrl.surprise:hover,.ctrl.surprise:active{background:rgba(255,220,50,.2);border-color:rgba(255,220,50,.5);color:#ffdc32;box-shadow:0 0 16px rgba(255,220,50,.2)}
 
/* PANEL */
.panel{position:fixed;top:0;right:0;bottom:0;z-index:20;width:min(340px,92vw);
  background:rgba(3,5,9,.97);backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,.07);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden}
.panel.open{transform:translateX(0)}
.panel-hd{padding:14px 12px 10px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.panel-back{width:30px;height:30px;border-radius:6px;cursor:pointer;display:none;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  place-items:center;color:rgba(255,255,255,.45);font-size:12px;transition:all .18s;flex-shrink:0;}
.panel-back.show{display:grid}
.panel-back:hover{background:rgba(255,255,255,.1);color:#fff}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.08em;color:#ffb347;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptab-wrap{display:flex;gap:5px;flex-shrink:0}
.ptab{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:5px;
  cursor:pointer;font-family:'Space Mono',monospace;border:1px solid transparent;
  color:rgba(255,255,255,.32);background:transparent;transition:all .14s;}
.ptab:hover{color:rgba(255,255,255,.65)}
.ptab.on{background:rgba(255,179,71,.08);border-color:rgba(255,179,71,.28);color:#ffb347}
.panel-close{width:30px;height:30px;border-radius:6px;cursor:pointer;flex-shrink:0;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  display:grid;place-items:center;color:rgba(255,255,255,.38);font-size:13px;transition:all .18s;}
.panel-close:hover{background:rgba(255,255,255,.1);color:#fff}
.panel-body{flex:1;overflow-y:auto;padding:5px 7px 16px}
.panel-body::-webkit-scrollbar{width:2px}
.panel-body::-webkit-scrollbar-thumb{background:rgba(255,179,71,.22);border-radius:1px}
.panel-search{padding:8px 8px 4px;flex-shrink:0}
.panel-search input{width:100%;padding:8px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:#eef0f5;font-family:'Space Mono',monospace;font-size:11px;
  outline:none;transition:border-color .18s;}
.panel-search input:focus{border-color:rgba(255,179,71,.4)}
.panel-search input::placeholder{color:rgba(255,255,255,.2)}
.album-count-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.2);padding:6px 11px 3px}
.tag-bar{display:flex;gap:5px;padding:4px 8px 6px;overflow-x:auto;flex-shrink:0}
.tag-bar::-webkit-scrollbar{height:0}
.tag-pill{font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:5px 9px;
  border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);
  font-family:'Space Mono',monospace;transition:all .15s;}
.tag-pill:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.tag-pill.on{background:rgba(255,179,71,.14);border-color:rgba(255,179,71,.42);color:#ffb347}
.tag-pill.calm{background:rgba(78,240,255,.1);border-color:rgba(78,240,255,.3);color:#4ef0ff}
.tag-pill.calm.on{background:rgba(78,240,255,.22);border-color:rgba(78,240,255,.5)}
 
/* ALBUM LIST */
.album-item{display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;border-radius:8px;cursor:pointer;
  border:1px solid transparent;transition:all .14s;margin-bottom:2px;}
.album-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.06)}
.album-item.playing{background:rgba(255,179,71,.06);border-color:rgba(255,179,71,.2)}
.album-name{font-size:11px;letter-spacing:.04em;font-weight:700;color:rgba(255,255,255,.65)}
.album-item.playing .album-name{color:#fff}
.album-meta{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:.05em;margin-top:2px}
.album-arrow{font-size:10px;color:rgba(255,255,255,.18);flex-shrink:0;margin-left:8px}
 
/* TRACK LIST */
.trow{display:grid;grid-template-columns:26px 1fr auto;gap:8px;align-items:center;
  padding:7px 9px;border-radius:7px;cursor:pointer;border:1px solid transparent;
  transition:all .13s;margin-bottom:2px;}
.trow:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.06)}
.trow.on{background:rgba(255,179,71,.08);border-color:rgba(255,179,71,.24)}
.trow.inpl{border-color:rgba(78,240,255,.18)}
.tnum{font-family:'Bebas Neue',sans-serif;font-size:13px;color:rgba(255,255,255,.2);text-align:center}
.trow.on .tnum{color:#ffb347}
.tname{font-size:11px;letter-spacing:.03em;color:rgba(255,255,255,.55);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow.on .tname{color:#fff;font-weight:700}
.tactions{display:flex;gap:3px;align-items:center;flex-shrink:0}
.bars{display:none;gap:2px;align-items:flex-end;height:11px}
.trow.on .bars{display:flex}
.bar{width:2px;background:#ffb347;border-radius:1px;animation:bk .7s ease-in-out infinite}
.bar:nth-child(2){animation-delay:.12s}.bar:nth-child(3){animation-delay:.25s}
@keyframes bk{0%,100%{height:2px}50%{height:11px}}
.tadd{width:22px;height:22px;border-radius:5px;cursor:pointer;
  background:transparent;border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.22);font-size:11px;display:grid;place-items:center;transition:all .14s;}
.tadd:hover{background:rgba(78,240,255,.1);border-color:rgba(78,240,255,.3);color:#4ef0ff}
.trow.inpl .tadd{background:rgba(78,240,255,.1);border-color:rgba(78,240,255,.32);color:#4ef0ff}
 
/* PLAYLIST PANEL */
.pl-empty{padding:24px 12px;text-align:center;font-size:11px;color:rgba(255,255,255,.2);
  letter-spacing:.08em;text-transform:uppercase;line-height:2}
.pl-track{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
  padding:8px 9px;border-radius:7px;border:1px solid transparent;cursor:pointer;
  transition:all .13s;margin-bottom:2px;}
.pl-track:hover{background:rgba(255,255,255,.04)}
.pl-track.on{background:rgba(255,179,71,.08);border-color:rgba(255,179,71,.24)}
.pl-tname{font-size:11px;font-weight:700;color:rgba(255,255,255,.65);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-track.on .pl-tname{color:#fff}
.pl-talb{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:.05em;margin-top:2px}
.rm-btn{width:20px;height:20px;border-radius:4px;cursor:pointer;flex-shrink:0;
  background:transparent;border:1px solid rgba(255,80,80,.12);
  color:rgba(255,80,80,.35);font-size:9px;display:grid;place-items:center;transition:all .14s;}
.rm-btn:hover{background:rgba(255,80,80,.1);border-color:rgba(255,80,80,.38);color:#ff6666}
.pl-actions{display:flex;gap:6px;padding:8px 2px 4px;flex-shrink:0}
.pl-act-btn{flex:1;padding:7px;font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px;
  background:transparent;transition:all .18s;}
.pl-act-btn.clear{border:1px solid rgba(255,80,80,.15);color:rgba(255,80,80,.4);}
.pl-act-btn.clear:hover{background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.35);color:#ff6666}
.pl-act-btn.shuffle{border:1px solid rgba(200,255,74,.18);color:rgba(200,255,74,.5);}
.pl-act-btn.shuffle:hover{background:rgba(200,255,74,.08);border-color:rgba(200,255,74,.38);color:#c8ff4a}
 
/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);
  z-index:50;background:rgba(4,6,10,.95);border:1px solid rgba(255,179,71,.4);
  border-radius:7px;padding:9px 16px;font-size:10px;letter-spacing:.08em;
  color:#ffb347;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
 
/* SHARE SHEET */
.sh-overlay{position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .28s}
.sh-overlay.show{opacity:1;pointer-events:all}
.share-sheet{position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(4,6,10,.98);border-top:1px solid rgba(255,255,255,.08);
  border-radius:18px 18px 0 0;padding:20px 18px 36px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
.share-sheet.open{transform:translateY(0)}
.share-sheet h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.08em;color:#ffb347;margin-bottom:3px}
.share-sheet p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;margin-bottom:14px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.share-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.share-btn{padding:10px;border-radius:8px;font-family:'Space Mono',monospace;
  font-size:10px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.55);transition:all .18s;}
.share-btn:hover{background:rgba(255,179,71,.12);border-color:rgba(255,179,71,.35);color:#ffb347}
.share-cancel{width:100%;padding:10px;margin-top:8px;font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:7px;
  color:rgba(255,255,255,.25);transition:all .18s;}
.share-cancel:hover{background:rgba(255,255,255,.04)}
 
/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:15;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .28s}
.overlay.show{opacity:1;pointer-events:all}
 
/* SPLASH */
.splash{position:fixed;inset:0;z-index:50;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s;}
.splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:72px;height:72px;border-radius:15px;border:1px solid rgba(255,179,71,.4);
  overflow:hidden;animation:pulse 1.5s ease-in-out infinite}
.splash-logo img{width:100%;height:100%;object-fit:cover;display:block;background:url("https://media.emvycheck.com/IMAGES/LOGOS/EMVY_CHECK_LOGO_ORIGINAL.jpg") center/cover}
.splash-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.12em;color:rgba(255,179,71,.6)}
.splash-sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.26)}
@keyframes pulse{0%,100%{box-shadow:0 0 16px rgba(255,179,71,.18)}50%{box-shadow:0 0 32px rgba(255,179,71,.48)}}
</style>
</head>
<body>
 
<div class="splash" id="splash">
  <div class="splash-logo"><img/></div>
  <div class="splash-text">EMVY CHECK</div>
  <div class="splash-sub">Loading music...</div>
</div>
 
<canvas id="bg"></canvas>
<div class="logo" onclick="togglePanel('albums')"><img/></div>
 
<div class="top-right">
  <button class="top-btn" id="btnShareSite" onclick="openShare(null)">&#8679; Share</button>
  <a class="top-btn amber" href="/order.html">Order &rarr;</a>
</div>
 
<div class="track-block">
  <div class="track-info">
    <div class="track-album" id="tAlbum">EMVY CHECK</div>
    <div class="track-name idle" id="tName">Tap Albums to browse</div>
  </div>
  <button class="share-now-btn" id="shareTrackBtn" onclick="openShare('current')" title="Share this track">&#8679;</button>
  <button class="add-now-btn" id="addNowBtn" onclick="addCurrentToPlaylist()" title="Add to playlist">+</button>
</div>
 
<div class="progress-wrap">
  <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
  <div class="times"><span id="tCur">0:00</span><span id="tTot">0:00</span></div>
</div>
 
<div class="controls">
  <button class="ctrl" id="btnPrev">&#9664;&#9664;</button>
  <button class="ctrl play-btn" id="btnPlay">&#9654;</button>
  <button class="ctrl" id="btnPause">&#9646;&#9646;</button>
  <button class="ctrl" id="btnNext">&#9654;&#9654;</button>
  <button class="ctrl" id="btnShuffle" title="Shuffle all">&#9858;</button>
  <button class="ctrl surprise" id="btnSurprise" title="Surprise Me" onclick="surpriseMe()">&#9734;</button>
  <button class="ctrl" id="btnPl" title="Playlist">&#9776;</button>
</div>
 
<div class="overlay" id="overlay" onclick="closePanel()"></div>
 
<div class="panel" id="panel">
  <div class="panel-hd">
    <div class="panel-back" id="panelBack" onclick="showAlbums()">&#8592;</div>
    <div class="panel-title" id="panelTitle">Albums</div>
    <div class="ptab-wrap" id="ptabs">
      <button class="ptab on" onclick="showAlbums()">Albums</button>
      <button class="ptab" onclick="showPlaylist()">Queue <span id="plCount"></span></button>
    </div>
    <div class="panel-close" onclick="closePanel()">&#10005;</div>
  </div>
  <div class="panel-search" id="panelSearch">
    <input type="search" id="albumSearch" placeholder="Search albums..." oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <div class="tag-bar" id="tagBar"></div>
  <div class="panel-body" id="panelBody"></div>
</div>
 
<div class="sh-overlay" id="shOverlay" onclick="closeShare()"></div>
<div class="share-sheet" id="shareSheet">
  <h3 id="shareTitle">Share</h3>
  <p id="shareUrl">emvycheck.com</p>
  <div class="share-btns">
    <button class="share-btn" onclick="doShare('copy')">&#128203; Copy Link</button>
    <button class="share-btn" onclick="doShare('native')">&#8679; Share</button>
    <button class="share-btn" onclick="doShare('whatsapp')">&#128172; WhatsApp</button>
    <button class="share-btn" onclick="doShare('twitter')">&#120143; Post</button>
  </div>
  <button class="share-cancel" onclick="closeShare()">Cancel</button>
</div>
 
<div class="toast" id="toast"></div>
<audio id="au" crossorigin="anonymous" preload="none"></audio>
<audio id="auNext" crossorigin="anonymous" preload="auto" style="display:none"></audio>
 
<script>
var ALBUMS = [];
var cA = 0, cT = -1, muted = false, shuffleOn = false;
var aCtx, anl, dArr, conn = false;
var au = document.getElementById('au');
var playlist = [];
var plMode = false, plIdx = -1;
var shareTarget = null;
var GR=[['#ffb347','#ff6b00'],['#4ef0ff','#0066ff'],['#ff3fb0','#9900cc'],['#c8ff4a','#00aa00'],['#ff4444','#990000'],['#ffb347','#cc6600'],['#4ef0ff','#00ccaa'],['#ff3fb0','#ff0066'],['#ffdd00','#ff8800'],['#88ff44','#006600'],['#ff88aa','#cc0044'],['#44aaff','#0033cc']];
 
function fm(s){if(isNaN(s)||s===Infinity)return'0:00';var m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+(x<10?'0':'')+x;}
function iA(){
  if(conn)return;
  aCtx=new(window.AudioContext||window.webkitAudioContext)();
  anl=aCtx.createAnalyser();anl.fftSize=1024;
  dArr=new Uint8Array(anl.frequencyBinCount);
  var s=aCtx.createMediaElementSource(au);s.connect(anl);anl.connect(aCtx.destination);conn=true;
}
 
// ── PANEL ────────────────────────────────────────────────────────────────────
function togglePanel(view){
  var p=document.getElementById('panel');
  if(p.classList.contains('open'))closePanel();
  else openPanel(view||'albums');
}
function openPanel(view){
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  if(view==='playlist')showPlaylist();
  else showAlbums();
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
 
var activeTag='';
// MOOD TAGS shown in the bar — curated subset, not all 96
var MOOD_TAGS=['all','meditation','ambient','calm','folk','czech','dnb','techno','industrial',
  'metal','rave','protest','experimental','classical','jazz','punk','bass','dark'];
 
function buildTagBar(){
  var bar=document.getElementById('tagBar');bar.innerHTML='';
  MOOD_TAGS.forEach(function(tag){
    var b=document.createElement('button');
    b.className='tag-pill'+(tag==='all'&&!activeTag?' on':'')+(tag===activeTag?' on':'')+
      (tag==='meditation'||tag==='ambient'||tag==='calm'?' calm':'');
    b.textContent=tag==='all'?'All':tag;
    b.onclick=(function(t){return function(){setTag(t==='all'?'':t);};})(tag);
    bar.appendChild(b);
  });
}
function setTag(tag){
  activeTag=tag;
  document.getElementById('albumSearch').value='';
  buildTagBar();
  renderAlbumList('');
}
function renderAlbumList(filter){
  var body=document.getElementById('panelBody');body.innerHTML='';
  var q=(filter||'').toLowerCase().trim();
  var shown=0;
  ALBUMS.forEach(function(a,i){
    if(q&&a.name.toLowerCase().indexOf(q)===-1&&(a.desc||'').toLowerCase().indexOf(q)===-1)return;
    if(activeTag){
      var tags=a.tags||[];
      if(tags.indexOf(activeTag)===-1)return;
    }
    var d=document.createElement('div');
    d.className='album-item'+(i===cA?' playing':'');
    var tagStr=a.tags?a.tags.slice(0,3).join(' · '):'';
    d.innerHTML='<div><div class="album-name">'+a.name+'</div><div class="album-meta">'+a.tracks.length+' tracks'+(tagStr?' &middot; '+tagStr:'')+'</div></div><div class="album-arrow">&#8250;</div>';
    d.onclick=(function(x){return function(){showTracks(x);};})(i);
    body.appendChild(d);shown++;
  });
  if(shown===0){
    var e=document.createElement('div');
    e.className='album-count-label';
    e.textContent=activeTag?'No "'+activeTag+'" albums found':'No albums match';
    body.appendChild(e);
  } else {
    var lbl=document.createElement('div');
    lbl.className='album-count-label';
    lbl.textContent=shown+(shown<ALBUMS.length?' of '+ALBUMS.length:'')+' albums';
    body.insertBefore(lbl,body.firstChild);
  }
}
function onSearch(val){activeTag='';buildTagBar();renderAlbumList(val);}
function filterAlbums(val){renderAlbumList(val);}
function showAlbums(){
  document.getElementById('panelTitle').textContent='Albums';
  document.getElementById('panelBack').classList.remove('show');
  document.getElementById('panelSearch').style.display='';
  document.getElementById('tagBar').style.display='';
  document.querySelectorAll('.ptab').forEach(function(t,i){t.classList.toggle('on',i===0);});
  var search=document.getElementById('albumSearch');
  search.value='';
  buildTagBar();
  renderAlbumList('');
}
 
function showTracks(ai){
  var alb=ALBUMS[ai];
  document.getElementById('panelTitle').textContent=alb.name;
  document.getElementById('panelBack').classList.add('show');
  document.getElementById('panelSearch').style.display='none';
  document.getElementById('tagBar').style.display='none';
  document.getElementById('tagBar').style.display='none';
  document.querySelectorAll('.ptab').forEach(function(t,i){t.classList.toggle('on',i===0);});
  var body=document.getElementById('panelBody');body.innerHTML='';
  alb.tracks.forEach(function(t,i){
    var inPl=isInPlaylist(ai,i);
    var active=(!plMode&&ai===cA&&i===cT);
    var d=document.createElement('div');
    d.className='trow'+(active?' on':'')+(inPl?' inpl':'');
    d.innerHTML='<div class="tnum">'+String(i+1).padStart(2,'0')+'</div>'+
      '<div class="tname">'+t.title+'</div>'+
      '<div class="tactions">'+
        '<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>'+
        '<button class="tadd" title="'+(inPl?'In playlist':'Add to playlist')+'">'+(inPl?'&#10003;':'&#43;')+'</button>'+
      '</div>';
    d.addEventListener('click',function(e){
      if(e.target.classList.contains('tadd'))return;
      plMode=false;pT(ai,i);closePanel();
    });
    d.querySelector('.tadd').addEventListener('click',function(e){
      e.stopPropagation();togglePlaylist(ai,i);showTracks(ai);
    });
    body.appendChild(d);
  });
}
 
function showPlaylist(){
  document.getElementById('panelTitle').textContent='Queue';
  document.getElementById('panelBack').classList.remove('show');
  document.getElementById('panelSearch').style.display='none';
  document.getElementById('tagBar').style.display='none';
  document.getElementById('tagBar').style.display='none';
  document.querySelectorAll('.ptab').forEach(function(t,i){t.classList.toggle('on',i===1);});
  var body=document.getElementById('panelBody');body.innerHTML='';
  if(playlist.length===0){
    body.innerHTML='<div class="pl-empty">Queue is empty.<br>Tap + on any track<br>or the + button while playing.</div>';
    return;
  }
  // actions row
  var acts=document.createElement('div');acts.className='pl-actions';
  var shuf=document.createElement('button');shuf.className='pl-act-btn shuffle';shuf.textContent='&#9858; Shuffle queue';
  shuf.onclick=function(){shufflePlaylist();showToast('Queue shuffled');};
  var clr=document.createElement('button');clr.className='pl-act-btn clear';clr.textContent='&#10005; Clear';
  clr.onclick=function(){playlist=[];plMode=false;plIdx=-1;updatePlCount();showPlaylist();};
  acts.appendChild(shuf);acts.appendChild(clr);body.appendChild(acts);
 
  playlist.forEach(function(item,i){
    var d=document.createElement('div');
    d.className='pl-track'+(plMode&&i===plIdx?' on':'');
    d.innerHTML='<div><div class="pl-tname">'+item.title+'</div><div class="pl-talb">'+item.albumName+'</div></div>'+
      '<button class="rm-btn">&#10005;</button>';
    d.addEventListener('click',function(e){
      if(e.target.classList.contains('rm-btn'))return;
      playFromPlaylist(i);closePanel();
    });
    d.querySelector('.rm-btn').addEventListener('click',function(e){
      e.stopPropagation();
      playlist.splice(i,1);
      if(plMode&&plIdx>=playlist.length)plIdx=playlist.length-1;
      updatePlCount();showPlaylist();
    });
    body.appendChild(d);
  });
}
 
function shufflePlaylist(){
  for(var i=playlist.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=playlist[i];playlist[i]=playlist[j];playlist[j]=tmp;
  }
  plIdx=-1;
}
 
function isInPlaylist(ai,ti){
  for(var i=0;i<playlist.length;i++)if(playlist[i].ai===ai&&playlist[i].ti===ti)return true;
  return false;
}
function togglePlaylist(ai,ti){
  for(var i=0;i<playlist.length;i++){
    if(playlist[i].ai===ai&&playlist[i].ti===ti){
      playlist.splice(i,1);updatePlCount();
      showToast('Removed from queue');
      updateAddNowBtn();return;
    }
  }
  playlist.push({ai:ai,ti:ti,title:ALBUMS[ai].tracks[ti].title,albumName:ALBUMS[ai].name,src:ALBUMS[ai].tracks[ti].src});
  updatePlCount();showToast('Added to queue');updateAddNowBtn();
}
 
// ADD CURRENT TRACK to playlist from the + button
function addCurrentToPlaylist(){
  if(cT===-1)return;
  togglePlaylist(cA,cT);
}
function updateAddNowBtn(){
  var btn=document.getElementById('addNowBtn');
  var inPl=(cT!==-1)&&isInPlaylist(cA,cT);
  btn.classList.toggle('in-pl',inPl);
  btn.title=inPl?'Remove from queue':'Add to queue';
  btn.textContent=inPl?'✓':'+';
}
 
function updatePlCount(){
  var el=document.getElementById('plCount');
  el.textContent=playlist.length>0?'('+playlist.length+')':'';
  document.getElementById('btnPl').classList.toggle('active-pl',playlist.length>0);
}
function playFromPlaylist(i){
  plMode=true;plIdx=i;
  var item=playlist[i];
  cA=item.ai;cT=item.ti;
  document.getElementById('tName').textContent=item.title;
  document.getElementById('tName').classList.remove('idle');
  document.getElementById('tAlbum').textContent=item.albumName;
  updateAddNowBtn();
  au.src=item.src;iA();au.play().catch(function(){});
  document.getElementById('btnPlay').classList.add('on');
}
 
// ── PLAY ─────────────────────────────────────────────────────────────────────
function pT(ai,ti){
  plMode=false;cA=ai;cT=ti;
  var tk=ALBUMS[ai].tracks[ti];
  document.getElementById('tName').textContent=tk.title;
  document.getElementById('tName').classList.remove('idle');
  document.getElementById('tAlbum').textContent=ALBUMS[ai].name;
  updateAddNowBtn();
  au.src=tk.src;iA();au.play().catch(function(){});
  document.getElementById('btnPlay').classList.add('on');
  updateURL(ai,ti);
  preloadNext(ai,ti);
}
 
function preloadNext(ai,ti){
  var auNext=document.getElementById('auNext');
  // preload next track in album
  var nextTi=ti+1;
  var nextAi=ai;
  if(nextTi>=ALBUMS[ai].tracks.length){
    nextAi=(ai+1)%ALBUMS.length;
    nextTi=0;
  }
  var nextSrc=ALBUMS[nextAi].tracks[nextTi].src;
  if(auNext.dataset.preloaded!==nextSrc){
    auNext.src=nextSrc;
    auNext.dataset.preloaded=nextSrc;
    auNext.load();
  }
}
 
function totalTracks(){
  var c=0;for(var i=0;i<ALBUMS.length;i++)c+=ALBUMS[i].tracks.length;return c;
}
function randomGlobal(){
  var r=Math.floor(Math.random()*totalTracks()),c=0;
  for(var ai=0;ai<ALBUMS.length;ai++){
    if(r<c+ALBUMS[ai].tracks.length)return{ai:ai,ti:r-c};
    c+=ALBUMS[ai].tracks.length;
  }
  return{ai:0,ti:0};
}
function surpriseMe(){
  var r=randomGlobal();plMode=false;pT(r.ai,r.ti);
  showToast('\u25b6 '+ALBUMS[r.ai].tracks[r.ti].title);
}
function nextTrack(){
  if(plMode){
    if(shuffleOn){playFromPlaylist(Math.floor(Math.random()*playlist.length));return;}
    var n=plIdx+1;
    if(n<playlist.length)playFromPlaylist(n);
    else{document.getElementById('btnPlay').classList.remove('on');plMode=false;}
  } else {
    if(shuffleOn){var r=randomGlobal();pT(r.ai,r.ti);return;}
    var n=cT+1;
    if(n<ALBUMS[cA].tracks.length){pT(cA,n);}
    else{
      // auto-advance to next album
      var nextAlb=(cA+1)%ALBUMS.length;
      pT(nextAlb,0);
    }
  }
}
 
au.addEventListener('timeupdate',function(){
  if(!au.duration)return;
  document.getElementById('progFill').style.width=(au.currentTime/au.duration*100)+'%';
  document.getElementById('tCur').textContent=fm(au.currentTime);
  document.getElementById('tTot').textContent=fm(au.duration);
});
au.addEventListener('ended',nextTrack);
au.addEventListener('pause',function(){document.getElementById('btnPlay').classList.remove('on');});
au.addEventListener('play',function(){document.getElementById('btnPlay').classList.add('on');});
 
document.getElementById('progBar').addEventListener('click',function(e){
  if(!au.duration)return;
  var r=e.currentTarget.getBoundingClientRect();
  au.currentTime=((e.clientX-r.left)/r.width)*au.duration;
});
document.getElementById('btnPlay').addEventListener('click',function(){
  iA();if(aCtx&&aCtx.state==='suspended')aCtx.resume();
  if(cT===-1&&ALBUMS.length)openPanel('albums');
  else au.play().catch(function(){});
});
document.getElementById('btnPause').addEventListener('click',function(){au.pause();});
document.getElementById('btnPrev').addEventListener('click',function(){
  if(plMode){if(plIdx>0)playFromPlaylist(plIdx-1);}
  else{if(cT>0)pT(cA,cT-1);}
});
document.getElementById('btnNext').addEventListener('click',nextTrack);
document.getElementById('btnShuffle').addEventListener('click',function(){
  shuffleOn=!shuffleOn;
  document.getElementById('btnShuffle').classList.toggle('shuffle-on',shuffleOn);
  showToast(shuffleOn?'Shuffle on — all albums':'Shuffle off');
});
document.getElementById('btnPl').addEventListener('click',function(){togglePanel('playlist');});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closePanel();closeShare();}});
 
// ── SHARE ─────────────────────────────────────────────────────────────────────
function buildTrackUrl(ai,ti){
  var a=ALBUMS[ai],t=a.tracks[ti];
  return 'https://emvycheck.com?a='+encodeURIComponent(a.name)+'&t='+encodeURIComponent(t.title);
}
function openShare(target){
  if(target==='current'&&cT===-1)return;
  shareTarget=target;
  var url,title;
  if(target==='current'){
    url=buildTrackUrl(cA,cT);
    title=ALBUMS[cA].tracks[cT].title+' — EMVY CHECK';
  } else {
    url='https://emvycheck.com';
    title='EMVY CHECK — Custom Music from £10';
  }
  document.getElementById('shareTitle').textContent=target==='current'?ALBUMS[cA].tracks[cT].title:'EMVY CHECK';
  document.getElementById('shareUrl').textContent=url;
  document.getElementById('shareSheet').classList.add('open');
  document.getElementById('shOverlay').classList.add('show');
}
function closeShare(){
  document.getElementById('shareSheet').classList.remove('open');
  document.getElementById('shOverlay').classList.remove('show');
}
function doShare(method){
  var url=document.getElementById('shareUrl').textContent;
  var title=document.getElementById('shareTitle').textContent;
  var text=shareTarget==='current'?
    'Listen to "'+title+'" on EMVY CHECK — '+url:
    'EMVY CHECK — custom songs from £10, DnB, protest, folk & more — '+url;
  if(method==='copy'){
    navigator.clipboard.writeText(url).then(function(){showToast('Link copied!');}).catch(function(){showToast('Copy: '+url);});
  } else if(method==='native'&&navigator.share){
    navigator.share({title:title,text:text,url:url}).catch(function(){});
  } else if(method==='twitter'){
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
  } else if(method==='whatsapp'){
    window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
  }
  closeShare();
}
 
// ── URL — deep link to specific track ────────────────────────────────────────
function updateURL(ai,ti){
  var a=ALBUMS[ai],t=a.tracks[ti];
  var url='?a='+encodeURIComponent(a.name)+'&t='+encodeURIComponent(t.title);
  history.replaceState(null,'',url);
}
function checkURLParams(){
  var params=new URLSearchParams(window.location.search);
  var albumName=params.get('a'), trackTitle=params.get('t');
  if(!albumName)return;
  for(var ai=0;ai<ALBUMS.length;ai++){
    if(ALBUMS[ai].name===albumName){
      for(var ti=0;ti<ALBUMS[ai].tracks.length;ti++){
        if(!trackTitle||ALBUMS[ai].tracks[ti].title===trackTitle){
          pT(ai,ti);return;
        }
      }
    }
  }
}
 
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}
 
// ── CANVAS ────────────────────────────────────────────────────────────────────
var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
var W,H,cx,cy,particles=[],lissajous=[];
 
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;initParts();initLiss();}
function initParts(){
  particles=[];
  var isMobile=window.innerWidth<600;
  var c=isMobile?Math.min(60,Math.floor(W*H/12000)):Math.min(140,Math.floor(W*H/7000));
  for(var i=0;i<c;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.8+.3,hue:30+Math.random()*60,alpha:Math.random()*.5+.1,life:Math.random()});
}
function initLiss(){
  var r=Math.min(W,H);
  lissajous=[{a:3,b:2,d:Math.PI/4,col:'rgba(255,179,71,',r:r*.32},{a:5,b:4,d:Math.PI/3,col:'rgba(78,240,255,',r:r*.26},{a:4,b:3,d:Math.PI/6,col:'rgba(255,63,176,',r:r*.22},{a:7,b:6,d:Math.PI/5,col:'rgba(200,255,74,',r:r*.17}];
}
var drawActive=true;
var lastFrame=0;
document.addEventListener('visibilitychange',function(){
  drawActive=!document.hidden;
});
function draw(ts){
  requestAnimationFrame(draw);
  if(!drawActive)return;
  // throttle to ~30fps when paused, full 60fps when playing
  var minGap=au.paused?33:16;
  if(ts-lastFrame<minGap)return;
  lastFrame=ts;
  var t=Date.now()*.001,bass=0,mid=0,hi=0,energy=0;
  if(anl&&dArr){
    anl.getByteFrequencyData(dArr);
    for(var i=0;i<8;i++)bass+=dArr[i];bass/=(8*255);
    for(var i=8;i<64;i++)mid+=dArr[i];mid/=(56*255);
    for(var i=64;i<128;i++)hi+=dArr[i];hi/=(64*255);
    energy=(bass+mid+hi)/3;
  } else {bass=.14+Math.sin(t*1.8)*.07;mid=.1+Math.sin(t*2.3+1)*.06;hi=.07+Math.sin(t*3.1+2)*.05;energy=(bass+mid+hi)/3;}
  ctx.fillStyle='rgba(0,0,0,'+(0.08+bass*.05)+')';ctx.fillRect(0,0,W,H);
  var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*(.28+bass*.14));
  grd.addColorStop(0,'rgba(255,179,71,'+(0.04+bass*.07)+')');grd.addColorStop(.5,'rgba(78,240,255,'+(0.01+mid*.04)+')');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  var sp=.0007+energy*.0004;
  lissajous.forEach(function(cfg,li){
    ctx.beginPath();
    var segs=window.innerWidth<600?160:320;
    for(var i=0;i<segs;i++){
      var u=(i/segs)*Math.PI*2,ph=t*sp*60*(1+li*.3);
      var wb=anl?((dArr[Math.floor(i/320*dArr.length/4)]||0)/255)*.12:Math.sin(t+i*.02)*.04;
      var rx=cfg.r*(1+wb)*(1+energy*.1),ry=cfg.r*.85*(1+wb*.5)*(1+energy*.08);
      var px=cx+Math.sin(cfg.a*u+ph+cfg.d)*rx,py=cy+Math.sin(cfg.b*u+ph)*ry;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.strokeStyle=cfg.col+(.1+energy*.22)+')';ctx.lineWidth=.7+energy*1.1;
    ctx.shadowColor=cfg.col+(.25+energy*.35)+')';ctx.shadowBlur=5+energy*10;
    ctx.stroke();ctx.shadowBlur=0;
  });
  for(var i=0;i<68;i++){
    var ang=(i/68)*Math.PI*2-Math.PI/2;
    var v=anl?(dArr[Math.floor(i*dArr.length/68)]||0)/255:(.1+Math.sin(t*2+i*.15)*.07);
    var inn=Math.min(W,H)*.16,bL=v*Math.min(W,H)*.1+1,hue=38+(i/68)*180;
    ctx.strokeStyle='hsla('+hue+',100%,'+(52+v*25)+'%,'+(0.3+v*.45)+')';
    ctx.lineWidth=1.5;ctx.shadowColor='hsla('+hue+',100%,62%,.22)';ctx.shadowBlur=3;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(ang)*inn,cy+Math.sin(ang)*inn);
    ctx.lineTo(cx+Math.cos(ang)*(inn+bL),cy+Math.sin(ang)*(inn+bL));
    ctx.stroke();ctx.shadowBlur=0;
  }
  var oR=Math.min(W,H)*(.038+bass*.048);
  var og=ctx.createRadialGradient(cx,cy,0,cx,cy,oR*2.4);
  og.addColorStop(0,'rgba(255,255,255,'+(0.65+bass*.25)+')');og.addColorStop(.3,'rgba(255,179,71,'+(0.38+bass*.32)+')');og.addColorStop(1,'rgba(255,179,71,0)');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(cx,cy,oR*2.4,0,Math.PI*2);ctx.fill();
  particles.forEach(function(p){
    p.x+=p.vx*(1+bass*2.8);p.y+=p.vy*(1+bass*2.8);p.life+=.004;
    if(p.x<-10||p.x>W+10||p.y<-10||p.y>H+10||p.life>1){
      p.x=cx+(Math.random()-.5)*Math.min(W,H)*.42;p.y=cy+(Math.random()-.5)*Math.min(W,H)*.42;
      p.vx=(Math.random()-.5)*(.45+bass*1.8);p.vy=(Math.random()-.5)*(.45+bass*1.8);p.life=0;p.hue=30+Math.random()*60;
    }
    var al=p.alpha*(1-p.life*.7)*(energy>.08?1:.35);
    ctx.fillStyle='hsla('+p.hue+',90%,70%,'+al+')';ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1+bass*.8),0,Math.PI*2);ctx.fill();
  });
  ctx.strokeStyle='rgba(255,179,71,'+(0.012+Math.sin(t*5)*.007)+')';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
}
window.addEventListener('resize',resize);resize();requestAnimationFrame(draw);
 
fetch('https://media.emvycheck.com/playlist.json')
  .then(function(r){return r.json();})
  .then(function(data){
    ALBUMS=data.albums;
    document.getElementById('splash').classList.add('hide');
    setTimeout(function(){document.getElementById('splash').style.display='none';},700);
    checkURLParams();
  })
  .catch(function(){
    document.getElementById('splash').classList.add('hide');
    document.getElementById('tName').textContent='Could not load. Try refreshing.';
    setTimeout(function(){document.getElementById('splash').style.display='none';},700);
  });
</script>
